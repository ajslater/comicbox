comicbox:
  # Options
  compute_pages: False
  compute_page_count: True
  config: null
  delete_all_tags: False
  delete_keys: []
  delete_orig: False
  dest_path: .
  dry_run: False
  loglevel: INFO
  metadata: {}
  metadata_format: null
  metadata_cli: null
  pdf_page_format: ""
  read:
    - cli
    - comet
    - metroninfo
    - comicbookinfo
    - comicinfo
    - filename
    - json
    - pdf
    - yaml
  theme: gruvbox-dark
  replace_metadata: False
  read_ignore: []
  recurse: False
  stamp: False
  stamp_notes: True
  tagger: null

  # Actions
  cbz: False
  covers: False
  export: []
  import_paths: []
  index_from: null
  index_to: null
  print: ""
  rename: False
  validate: False
  write: []

  # Targets
  paths: null

  # Merge precedence (null → use MetadataSources enum order).
  merge_order: null

  # Parallel workers across files (1 = serial). Useful with --online for
  # batch tagging; respects per-API rate limits via process-wide token bucket.
  jobs: 1

  # Online metadata tagging
  online:
    # Match resolution policy. One of: always-prompt, strict, normal, eager.
    policy: normal
    unattended: False
    confidence_threshold: 0.95
    # When False (default), stop after the first online source that
    # contributes data (or has a stored id from a prior tag). Set True
    # to query every configured source. Sources named on the CLI via
    # --id / --series-id always run regardless. Priority order is
    # metron, then comicvine.
    tag_all_sources: False
    # When True, force a full search even if the comic already has a
    # stored identifier for the source. Does not override an explicit
    # --id flag.
    force_search: False
    # Legacy flags — translated to `policy`/`unattended` at run time with
    # a deprecation warning. Will be removed in a future release.
    skip_multiple: False
    accept_only: False
    ignore_existing: False

    # Cache
    cache_enabled: True
    cache_dir: null
    cache_ttl: 7d
    refresh_cache: False

    # Retry budget for transient API failures.
    retry_budget: 5

    # Per-source credentials and endpoints. A source is "configured" iff
    # its required fields have non-null values (after the resolution chain
    # CLI > env > config > keyring).
    metron:
      username: null
      password: null
      url: null

    comicvine:
      api_key: null
      url: null
