comicbox:
  general:
    config: null
    recurse: False
    dry_run: False
    loglevel: INFO
    dest_path: .
    delete_keys: []
    delete_orig: False
    metadata: {}
    metadata_cli: null
    metadata_format: null
    # Parallel workers across files (1 = serial). Useful with --online for
    # batch tagging. Workers share one Metron session that tracks the
    # server's rate-limit headers, and jobs is capped at 20 (Metron's
    # burst limit) when Metron is an active credentialed source.
    jobs: 1
    tagger: null
    theme: gruvbox-dark

  read:
    formats:
      - cli
      - comet
      - metroninfo
      - comicbookinfo
      - comicinfo
      - filename
      - json
      - pdf
      - yaml
    except: []
    # Merge precedence (null = MetadataSources enum order).
    merge_order: null

  write:
    formats: []
    replace: False
    stamp: False
    stamp_notes: True
    delete_all_tags: False

  print:
    phases: ""
    validate: False

  convert:
    cbz: False
    rename: False
    extract_pages_from: null
    extract_pages_to: null
    extract_covers: False
    import_paths: []
    export_formats: []
    pdf_pages: ""

  compute:
    pages: False
    page_count: True

  online:
    lookup:
      # Match-resolution aggressiveness. One of: ask, careful, auto, eager.
      match: auto
      # Whether prompts are allowed. One of: ask, never.
      prompts: ask
      # Force a fresh search even if the comic has a stored upstream id
      # and skip files already tagged from this source.
      rematch: False
      # Ordered source selection and run priority. The first listed
      # source runs first; with first_wins True its match ends the
      # lookup (e.g. [comicvine, metron] tries Comic Vine first and
      # falls back to Metron). null = every configured source in the
      # built-in order (metron, comicvine). Overridden by --online.
      sources: null
      # When True (default), stop after the first online source that
      # contributes data. Set False to query every selected source and
      # merge their metadata (CLI: --all-sources).
      first_wins: True

    auth:
      metron:
        user: null
        pass: null
        url: null
      comicvine:
        key: null
        url: null

    cache:
      # Tri-state cache mode: on, off, refresh.
      # Quoted to avoid YAML 1.1 interpreting bare `on`/`off` as booleans.
      mode: "on"
      dir: null
      ttl: 7d

    tuning:
      # Auto-write threshold (0-1) — top match must clear this to auto-write.
      auto_threshold: 0.95
      # Per-comic API effort for fan-out sources (ComicVine): minimal,
      # balanced, thorough. Metron doesn't fan out, so it ignores this.
      effort: balanced
      # Retry budget for transient API failures.
      retry_budget: 5
      # Per-source overrides — keyed by source name (metron, comicvine).
      # Each entry may override auto_threshold, effort, min_confidence,
      # disambiguation_margin, or solo_threshold. See settings.py for
      # shape. rate_limit.* keys (per_minute, per_day, per_second,
      # per_hour) are accepted but ignored with a warning: mokkari>=4
      # reads Metron's actual per-user limits from response headers, and
      # simyan manages ComicVine's internally.
      per_source: {}

  # Targets (CLI positional args).
  paths: null
